<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAP MADE IT Admin</title>
  <script type="module" src="/src/admin.js"></script>
</head>
<body>
  <main class="admin-shell">
    <header class="topbar">
      <h1>TRAP MADE IT Admin</h1>
      <p>Phase 2 scaffold: manage chapters and drops without editing gameplay code.</p>
    </header>

    <section class="card" id="statusCard">
      <h2>Validation</h2>
      <p id="statusText">Loading content...</p>
      <div class="button-row">
        <button id="resetBtn" type="button">Reset to Defaults</button>
        <button id="saveBtn" type="button">Save Changes</button>
      </div>
    </section>

    <section class="card">
      <h2>Chapters</h2>
      <div id="chapters"></div>
    </section>

    <section class="card">
      <h2>Drops</h2>
      <div id="drops"></div>
    </section>

    <section class="card">
      <h2>Import / Export</h2>
      <textarea id="jsonIO" rows="14" spellcheck="false"></textarea>
      <div class="button-row">
        <button id="exportBtn" type="button">Export JSON</button>
        <button id="importBtn" type="button">Import JSON</button>
      </div>
    </section>
  </main>
</body>
</html>
